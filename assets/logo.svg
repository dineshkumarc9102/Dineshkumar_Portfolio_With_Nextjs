<svg width="220" height="100" viewBox="0 0 400 140" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Portfolio Gradient -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"></stop>
      <stop offset="50%" stop-color="#8B5CF6"></stop>
      <stop offset="100%" stop-color="#22D3EE"></stop>
    </linearGradient>

    <!-- Soft Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- DK Monogram -->
  <text x="30" y="80" font-size="64" font-weight="700" fill="url(#grad)" font-family="Poppins, sans-serif" filter="url(#glow)">
    DK
  </text>

  <!-- Animated Curve -->
  <path id="orbitPath" d="M40 75 Q160 10 300 70" stroke="url(#grad)" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#glow)" stroke-dasharray="0,400">

    <animate attributeName="stroke-dasharray" from="0,400" to="400,0" dur="2s" repeatCount="indefinite"></animate>
  </path>

  <!-- Moving Dot -->
  <circle r="4" fill="#22D3EE">
    <animateMotion dur="2s" repeatCount="indefinite">
      <mpath href="#orbitPath"></mpath>
    </animateMotion>
  </circle>

  <!-- Name -->
  <text x="30" y="115" font-size="18" fill="#6B7280" font-family="Poppins, sans-serif" letter-spacing="2">
    DINESH KUMAR
  </text>

</svg>